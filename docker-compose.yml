version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-mock-key}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-mock-key}
      - SUPABASE_URL=${SUPABASE_URL:-mock-url}
      - SUPABASE_KEY=${SUPABASE_KEY:-mock-key}
    volumes:
      - ./backend:/code
    restart: always
